<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        #auth-page-container {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        #auth-page-container .auth-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 90px 20px;
        }

        #auth-page-container .auth-box {
            background: var(--surface);
            padding: 2.4rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            height: fit-content;
        }

        #auth-page-container h2 { margin: 0 0 14px; text-align: center; color: var(--text); font-size: 1.6em; }

        #auth-page-container p { text-align: center; color: var(--text-muted); font-size: 0.9em; margin-bottom: 18px; }

        #auth-page-container #auth-message {
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.9em;
            min-height: 1.2em;
            font-weight: 600;
            display: none;
        }

        #auth-page-container input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            box-sizing: border-box;
            border-radius: var(--radius-sm);
            transition: border-color 0.15s;
        }
        #auth-page-container input:focus { outline: none; border-color: var(--accent); }

        #auth-page-container button {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            border: none;
            color: #000;
            font-family: var(--font-body);
            font-weight: 700;
            cursor: pointer;
            margin-top: 18px;
            border-radius: var(--radius-sm);
            transition: background-color 0.15s;
        }

        #auth-page-container button:hover:not(:disabled) { background: var(--accent-hover); }
        #auth-page-container button:disabled { opacity: 0.45; cursor: not-allowed; }

        #auth-page-container .secondary-link {
            display: block;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 16px;
            font-size: 0.9em;
        }
        #auth-page-container .secondary-link:hover { color: var(--accent); }

        #auth-page-container .g-recaptcha { margin-top: 15px; display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div id="global-nav"></div>

    <div id="auth-page-container">
        <main class="auth-wrapper">
            <div class="auth-box">
                <h2>Reset Password</h2>
                <p>Enter the email linked to your account and we'll send you a reset link.</p>
                <div id="auth-message"></div>
                
                <input type="email" id="email" placeholder="Email Address" required>

                <div class="g-recaptcha" data-sitekey="6Lfr1r8sAAAAAFwVFCe-hWK0G4tDlju6Ai5whxEv" data-theme="dark"></div>
                
                <button id="reset-btn" onclick="handleResetRequest()">Send Reset Link</button>
                <a href="/login" class="secondary-link">Back to Login</a>
            </div>
        </main>
    </div>

    <script src="/nav.js"></script>
    <script>
        const msgDiv = document.getElementById('auth-message');
        const btn = document.getElementById('reset-btn');

        function showMessage(text, isError) {
            msgDiv.innerText = text;
            msgDiv.style.color = isError ? "#ff4444" : "#ffffff";
            msgDiv.style.display = "block";
        }

        async function handleResetRequest() {
            const email = document.getElementById('email').value;
            const captchaResponse = grecaptcha.getResponse();

            if (!email || !email.includes('@')) {
                return showMessage("Please enter a valid email address.", true);
            }
            if (!captchaResponse) {
                return showMessage("Please complete the CAPTCHA.", true);
            }

            btn.disabled = true;
            const originalText = btn.innerText;
            btn.innerText = "Sending...";

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, captchaToken: captchaResponse })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage(data.message, false);
                    document.getElementById('email').value = "";
                    grecaptcha.reset();
                } else {
                    showMessage(data.error || "Something went wrong.", true);
                    grecaptcha.reset();
                }
            } catch (err) {
                showMessage("Server error. Please try again later.", true);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        }
    </script>
</body>
</html>
