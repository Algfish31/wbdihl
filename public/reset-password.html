<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        #auth-page-container {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        #auth-page-container .auth-wrapper {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 90px 20px;
        }

        #auth-page-container .auth-box {
            background: var(--surface);
            padding: 2.4rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 420px;
            height: fit-content;
        }

        #auth-page-container h2 { margin: 0 0 18px; text-align: center; color: var(--text); font-size: 1.6em; }

        #auth-page-container #auth-message {
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.9em;
            min-height: 1.2em;
            font-weight: 600;
            display: none;
        }

        #auth-page-container input {
            width: 100%;
            padding: 12px 14px;
            margin: 8px 0;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            box-sizing: border-box;
            border-radius: var(--radius-sm);
            transition: border-color 0.15s;
        }
        #auth-page-container input:focus { outline: none; border-color: var(--accent); }

        #auth-page-container button {
            width: 100%;
            padding: 13px;
            background: var(--accent);
            border: none;
            color: #000;
            font-family: var(--font-body);
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
            border-radius: var(--radius-sm);
            transition: background-color 0.15s;
        }

        #auth-page-container button:hover:not(:disabled) { background: var(--accent-hover); }
        #auth-page-container button:disabled { opacity: 0.45; cursor: not-allowed; }

        #auth-page-container .secondary-link {
            display: block;
            text-align: center;
            color: var(--text-muted);
            text-decoration: none;
            margin-top: 16px;
            font-size: 0.9em;
        }
        #auth-page-container .secondary-link:hover { color: var(--accent); }
    </style>
</head>
<body>
    <div id="global-nav"></div>

    <div id="auth-page-container">
        <main class="auth-wrapper">
            <div class="auth-box">
                <h2>Reset your Password</h2>
                <div id="auth-message"></div>
                
                <input type="password" id="password" placeholder="New Password (min 6 chars)" minlength="6">
                <input type="password" id="confirm-password" placeholder="Confirm New Password">

                <button id="reset-btn" onclick="handleReset()">Update Password</button>
                <a href="/login" class="secondary-link">Back to Login</a>
            </div>
        </main>
    </div>

    <script src="/nav.js"></script>
    <script>
        const msgDiv = document.getElementById('auth-message');
        const btn = document.getElementById('reset-btn');

        function showMessage(text, isError) {
            msgDiv.innerText = text;
            msgDiv.style.color = isError ? "#ff4444" : "#ffffff";
            msgDiv.style.display = "block"; // Make visible when called
        }

        async function handleReset() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;

            if (!token) {
                return showMessage("Missing reset token. Please use the link from your email.", true);
            }
            if (password.length < 6) {
                return showMessage("Password must be at least 6 characters.", true);
            }
            if (password !== confirmPassword) {
                return showMessage("Passwords do not match!", true);
            }

            btn.disabled = true;
            btn.innerText = "Updating...";

            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage("Password updated! Redirecting to login...", false);
                    setTimeout(() => {
                        window.location.href = "/login";
                    }, 3000);
                } else {
                    showMessage(data.error || "Reset failed.", true);
                    btn.disabled = false;
                    btn.innerText = "Update Password";
                }
            } catch (err) {
                showMessage("Server error. Please try again later.", true);
                btn.disabled = false;
                btn.innerText = "Update Password";
            }
        }
    </script>
</body>
</html>
