<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | WBDL</title>
    <link rel="icon" type="image/png" href="/assets/icon.png">
    <link rel="stylesheet" href="/style.css">
    <style>
        .page-content {
            flex: 1 0 auto;
            width: 100%;
            max-width: 880px;
            margin: 0 auto;
            padding: 30px 20px 75px;
            min-height: 1000px;
            box-sizing: border-box;
        }

        .leaderboard-header {
            text-align: center;
            padding: 36px 0;
        }

        .leaderboard-header h1 {
            font-size: 2.4em;
            color: var(--accent);
            margin: 0 0 8px;
        }
        .leaderboard-header p { color: var(--text-muted); }

        .leaderboard-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--surface);
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        th {
            background: var(--surface-2);
            color: var(--text-muted);
            padding: 16px 18px;
            text-align: left;
            text-transform: uppercase;
            font-family: var(--font-body);
            font-weight: 600;
            font-size: 0.8em;
            letter-spacing: 1px;
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td { border-bottom: none; }
        tr:hover { background: var(--surface-2); }

        .rank {
            font-family: var(--font-display);
            width: 60px;
            color: var(--text-muted);
            font-size: 1.05em;
        }

        .rank-1 { color: #ffcf40 !important; }
        .rank-2 { color: #cdd2d8 !important; }
        .rank-3 { color: #d08a4f !important; }

        .player-name {
            font-weight: 600;
            font-size: 1.05em;
        }

        .player-name a {
            color: var(--text);
            text-decoration: none;
            transition: color 0.15s;
        }

        .player-name a:hover { color: var(--accent); }

        .points {
            color: var(--accent);
            font-family: var(--font-display);
            font-size: 1.05em;
        }

        .count-tag {
            color: var(--text-muted);
            font-size: 0.9em;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 10px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9em;
        }
        .back-link:hover { color: var(--text); }
    </style>
</head>
<body>

    <div id="global-nav"></div>

    <main class="page-content">
        <a href="/" class="back-link">Back to List</a>
        
        <header class="leaderboard-header">
            <h1>Stats Viewer</h1>
            <p style="color: #666;">Do y'all have a life?</p>
        </header>

        <table class="leaderboard-table">
            <thead>
                <tr id="table-header-row">
                    <th>Rank</th>
                    <th>Player</th>
                    <th id="completions-th">Completions</th>
                    <th style="text-align: right;">Points</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
            </tbody>
        </table>
    </main>

    <script src="/nav.js"></script>
    <script>
        const isImpossibleList = window.location.hostname.includes('impossible');

        if (isImpossibleList) {
            document.body.classList.add('impossible-list');
            const completionsTh = document.getElementById('completions-th');
            if (completionsTh) {
                completionsTh.remove();
            }
        }

        async function loadLeaderboard() {
            try {
                const res = await fetch('/api/leaderboard');
                const players = await res.json();
                const body = document.getElementById('leaderboard-body');

                if (players.length === 0) {
                    const colspanValue = isImpossibleList ? "3" : "4";
                    body.innerHTML = `<tr><td colspan="${colspanValue}" style="text-align:center; color:#666;">No players found on the leaderboard yet.</td></tr>`;
                    return;
                }

                body.innerHTML = players.map((player) => {
                    let completionsTd = "";
                    if (!isImpossibleList) {
                        completionsTd = `
                            <td class="count-tag">
                                <span style="color: #888;">${player.main_completions || 0}</span> <span style="font-size: 0.8em; color: #444;">MAIN</span> 
                                <span style="color: #888;">${player.extended_completions || 0}</span> <span style="font-size: 0.8em; color: #444;">EXTENDED</span>
                            </td>
                        `;
                    }

                    let rankClass = "";
                    if (player.rank === 1) rankClass = "rank-1";
                    else if (player.rank === 2) rankClass = "rank-2";
                    else if (player.rank === 3) rankClass = "rank-3";

                    return `
                        <tr>
                            <td class="rank ${rankClass}">#${player.rank}</td>
                            <td class="player-name">
                                <a href="/profile?user=${player.username}">${player.username}</a>
                            </td>
                            ${completionsTd}
                            <td class="points" style="text-align: right;">${player.total_points}</td>
                        </tr>
                    `;
                }).join('');
            } catch (err) {
                console.error("Leaderboard fetch failed:", err);
            }
        }
        loadLeaderboard();
    </script>
</body>
</html>
